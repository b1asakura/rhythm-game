<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhythm Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050510;
    color: #fff;
    font-family: 'Arial', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }
  #game-container {
    position: relative;
    width: 480px;
    height: 700px;
    background: linear-gradient(180deg, #0d0d2b 0%, #1a0a2e 100%);
    border: 2px solid #2a2a4a;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(100,60,200,0.25);
  }

  /* ── Shared ── */
  .screen { position: absolute; inset: 0; display: none; flex-direction: column; justify-content: center; align-items: center; }
  .screen.active { display: flex; }

  .btn-primary {
    padding: 12px 44px;
    background: linear-gradient(90deg, #a855f7, #60a5fa);
    border: none; border-radius: 30px;
    color: #fff; font-size: 18px; font-weight: bold;
    cursor: pointer; letter-spacing: 2px;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-primary:hover  { transform: scale(1.05); box-shadow: 0 0 20px rgba(168,85,247,.6); }
  .btn-primary:active { transform: scale(0.97); }

  .btn-ghost {
    padding: 8px 28px;
    background: transparent; border: 1px solid #444; border-radius: 20px;
    color: #888; font-size: 14px; cursor: pointer; letter-spacing: 1px;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-ghost:hover { border-color: #888; color: #ccc; }

  .game-logo {
    font-size: 48px; font-weight: bold;
    background: linear-gradient(90deg, #ff6ec7, #a855f7, #60a5fa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 4px;
  }

  /* ── TITLE ── */
  #title-screen { gap: 28px; background: linear-gradient(180deg,#0d0d2b,#1a0a2e); z-index: 10; }
  #title-screen p { color: #666; font-size: 13px; text-align: center; line-height: 1.9; }

  /* ── SELECT ── */
  #select-screen { gap: 0; background: #080818; z-index: 10; }
  .select-header {
    width: 100%; padding: 18px 24px 14px;
    font-size: 12px; letter-spacing: 3px; color: #555;
    border-bottom: 1px solid #1a1a30; flex-shrink: 0;
  }
  #song-list {
    flex: 1; width: 100%; overflow-y: auto;
    padding: 12px 16px; display: flex; flex-direction: column; gap: 10px;
  }
  #song-list::-webkit-scrollbar { width: 4px; }
  #song-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .song-card {
    position: relative; padding: 14px 18px 12px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 10px; overflow: hidden;
    transition: background 0.15s, border-color 0.15s;
  }
  .song-card::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px; border-radius: 10px 0 0 10px;
    background: var(--card-color, #a855f7); opacity: 0.8;
  }
  .song-card:hover { background: rgba(255,255,255,0.05); border-color: var(--card-color, #a855f7); }
  .song-card-top {
    display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;
  }
  .song-card-title { font-size: 17px; font-weight: bold; color: #fff; }
  .song-card-bpm {
    font-size: 11px; font-weight: bold; color: var(--card-color,#a855f7);
    background: rgba(255,255,255,0.06); padding: 3px 8px; border-radius: 10px; letter-spacing: 1px;
  }
  .song-card-diffs { display: flex; gap: 6px; }
  .diff-btn {
    flex: 1; padding: 7px 4px;
    border-radius: 6px; border: 1px solid; background: transparent;
    font-size: 11px; font-weight: bold; letter-spacing: 1px; cursor: pointer;
    transition: background 0.1s, transform 0.08s;
  }
  .diff-btn:hover  { background: rgba(255,255,255,0.1); }
  .diff-btn:active { transform: scale(0.95); }
  .diff-btn.easy   { color: #4ade80; border-color: #4ade80; }
  .diff-btn.normal { color: #facc15; border-color: #facc15; }
  .diff-btn.hard   { color: #f87171; border-color: #f87171; }

  .select-footer {
    width: 100%; padding: 14px 24px; border-top: 1px solid #1a1a30;
    display: flex; justify-content: center; flex-shrink: 0;
  }

  /* ── GAME ── */
  #game-screen { display: none; flex-direction: column; }

  #lane-container {
    position: absolute; top: 0; bottom: 0;
    left: 50%; transform: translateX(-50%); width: 360px;
  }
  .lane-line { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,255,255,0.07); }

  #hit-zone {
    position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
    width: 360px; height: 8px; background: rgba(255,255,255,0.13);
    border-radius: 4px; z-index: 2;
  }
  #lane-buttons {
    position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
    width: 360px; display: flex; gap: 8px;
  }
  .lane-btn {
    flex: 1; height: 40px; border-radius: 8px; border: 2px solid;
    background: rgba(255,255,255,0.05); color: #fff; font-size: 14px; font-weight: bold;
    cursor: pointer; transition: background 0.05s; user-select: none;
  }
  .lane-btn:active, .lane-btn.pressed { background: rgba(255,255,255,0.22); }
  .lane-btn[data-lane="0"] { border-color: #f87171; }
  .lane-btn[data-lane="1"] { border-color: #facc15; }
  .lane-btn[data-lane="2"] { border-color: #4ade80; }
  .lane-btn[data-lane="3"] { border-color: #60a5fa; }

  .note {
    position: absolute; width: 76px; height: 22px; border-radius: 6px;
    transform: translateX(-50%); box-shadow: 0 0 12px currentColor;
  }
  .note[data-lane="0"] { background: linear-gradient(90deg,#f87171,#fca5a5); color: #f87171; border: 1px solid #fca5a5; }
  .note[data-lane="1"] { background: linear-gradient(90deg,#ca8a04,#facc15); color: #facc15; border: 1px solid #facc15; }
  .note[data-lane="2"] { background: linear-gradient(90deg,#4ade80,#86efac); color: #4ade80; border: 1px solid #86efac; }
  .note[data-lane="3"] { background: linear-gradient(90deg,#3b82f6,#60a5fa); color: #60a5fa; border: 1px solid #93c5fd; }

  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0; padding: 10px 16px;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(0,0,0,0.45); z-index: 5;
  }
  #score-display { font-size: 26px; font-weight: bold; font-variant-numeric: tabular-nums; }
  #hud-right { text-align: right; }
  #hud-song  { font-size: 10px; color: #555; letter-spacing: 1px; }
  #hud-diff  { font-size: 10px; letter-spacing: 1px; margin-top: 2px; }

  #hp-bar-container {
    position: absolute; top: 54px; left: 16px; right: 16px;
    height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; z-index: 5;
  }
  #hp-bar { height: 100%; border-radius: 5px; transition: width 0.2s; }

  #progress-bar-container {
    position: absolute; top: 74px; left: 16px; right: 16px;
    height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; z-index: 5;
  }
  #progress-bar {
    height: 100%; background: rgba(168,85,247,0.7);
    border-radius: 2px; width: 0%; transition: width 0.1s;
  }

  /* ── Judgment + Combo (same area) ── */
  #judgment-text {
    position: absolute; top: 42%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 30px; font-weight: bold;
    pointer-events: none; opacity: 0; z-index: 6;
    text-shadow: 0 0 20px currentColor;
  }
  #combo-display {
    position: absolute; top: 52%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 22px; font-weight: bold; color: #facc15;
    pointer-events: none; z-index: 6; text-align: center;
    white-space: nowrap; min-height: 28px;
  }

  .hit-effect {
    position: absolute; width: 84px; height: 32px;
    border-radius: 50%; transform: translateX(-50%);
    pointer-events: none; animation: hit-anim 0.3s ease-out forwards;
  }
  @keyframes hit-anim {
    0%   { opacity: 0.85; transform: translateX(-50%) scale(1); }
    100% { opacity: 0;    transform: translateX(-50%) scaleX(2) scaleY(2.4); }
  }

  #countdown {
    position: absolute; inset: 0; display: none;
    justify-content: center; align-items: center;
    font-size: 80px; font-weight: bold;
    z-index: 8; background: rgba(0,0,0,0.55);
  }

  /* ── RESULT ── */
  #result-screen { gap: 14px; background: rgba(8,8,24,0.97); z-index: 10; }
  #result-song-name { font-size: 11px; color: #888; letter-spacing: 2px; text-transform: uppercase; }
  #result-diff-badge {
    font-size: 11px; font-weight: bold; letter-spacing: 2px; padding: 3px 10px;
    border-radius: 10px; border: 1px solid;
  }
  #result-rank  { font-size: 100px; font-weight: bold; line-height: 1; }
  #result-status { font-size: 20px; font-weight: bold; letter-spacing: 3px; }
  .result-stats {
    display: flex; flex-direction: column; gap: 8px;
    background: rgba(255,255,255,0.04);
    padding: 16px 36px; border-radius: 12px; width: 310px;
  }
  .stat-row { display: flex; justify-content: space-between; font-size: 15px; }
  .stat-label { color: #666; }
  .stat-value { font-weight: bold; }
  .stat-value.great { color: #a855f7; }
  .stat-value.good  { color: #4ade80; }
  .stat-value.bad   { color: #facc15; }
  .stat-value.miss  { color: #f87171; }
  .result-actions { display: flex; gap: 12px; }
</style>
</head>
<body>
<div id="game-container">

  <audio id="bgm" preload="auto"></audio>

  <!-- TITLE -->
  <div id="title-screen" class="screen active">
    <div class="game-logo">RHYTHM</div>
    <p>キーボード: D / F / J / K<br>またはボタンをクリック</p>
    <button class="btn-primary" id="title-start-btn">SELECT SONG</button>
  </div>

  <!-- SELECT -->
  <div id="select-screen" class="screen">
    <div class="select-header">SELECT SONG</div>
    <div id="song-list"></div>
    <div class="select-footer">
      <button class="btn-ghost" id="select-back-btn">BACK</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="game-screen">
    <div id="hud">
      <div id="score-display">0</div>
      <div id="hud-right">
        <div id="hud-song"></div>
        <div id="hud-diff"></div>
      </div>
    </div>
    <div id="hp-bar-container"><div id="hp-bar"></div></div>
    <div id="progress-bar-container"><div id="progress-bar"></div></div>

    <div id="lane-container">
      <div class="lane-line" style="left:90px"></div>
      <div class="lane-line" style="left:180px"></div>
      <div class="lane-line" style="left:270px"></div>
    </div>
    <div id="hit-zone"></div>
    <div id="lane-buttons">
      <button class="lane-btn" data-lane="0">D</button>
      <button class="lane-btn" data-lane="1">F</button>
      <button class="lane-btn" data-lane="2">J</button>
      <button class="lane-btn" data-lane="3">K</button>
    </div>
    <div id="judgment-text"></div>
    <div id="combo-display"></div>
    <div id="countdown"></div>
  </div>

  <!-- RESULT -->
  <div id="result-screen" class="screen">
    <div id="result-song-name"></div>
    <div id="result-diff-badge"></div>
    <div id="result-rank">S</div>
    <div id="result-status">CLEAR!</div>
    <div class="result-stats">
      <div class="stat-row"><span class="stat-label">Score</span><span class="stat-value" id="r-score">0</span></div>
      <div class="stat-row"><span class="stat-label">Max Combo</span><span class="stat-value" id="r-combo">0</span></div>
      <div class="stat-row"><span class="stat-label">Great</span><span class="stat-value great" id="r-great">0</span></div>
      <div class="stat-row"><span class="stat-label">Good</span><span class="stat-value good" id="r-good">0</span></div>
      <div class="stat-row"><span class="stat-label">Bad</span><span class="stat-value bad" id="r-bad">0</span></div>
      <div class="stat-row"><span class="stat-label">Miss</span><span class="stat-value miss" id="r-miss">0</span></div>
    </div>
    <div class="result-actions">
      <button class="btn-ghost" id="result-back-btn">SELECT</button>
      <button class="btn-primary" id="retry-btn" style="font-size:15px;padding:10px 32px;">RETRY</button>
    </div>
  </div>

</div>
<script>
// ═══════════════════════════════════
//  EASY MAP FACTORY  (quarter notes)
// ═══════════════════════════════════
function makeEasy(bpm, totalBars) {
  return function() {
    const b = 60000 / bpm;
    const notes = [];
    // 16-step lane sequence covering all 4 lanes in cascade patterns
    const seq = [0,1,2,3, 3,2,1,0, 0,2,1,3, 1,3,0,2];
    let idx = 0;
    for (let bar = 1; bar <= totalBars; bar++) {
      for (let beat = 0; beat < 4; beat++) {
        notes.push({ time: Math.round((bar * 4 + beat) * b), lane: seq[idx % seq.length] });
        idx++;
      }
    }
    return notes;
  };
}

// ═══════════════════════════════════
//  SONG DEFINITIONS
// ═══════════════════════════════════
const SONGS = [

  // ── Rhythm Cascade ── 140 BPM ──────────────────────────────────
  {
    id: 'rhythm_cascade', title: 'Rhythm Cascade',
    file: 'bgm/Rhythm_Cascade.mp3', bpm: 140, color: '#60a5fa',
    difficulties: [
      // EASY
      { label: 'EASY', color: '#4ade80', generateNotes: makeEasy(140, 17) },

      // NORMAL
      { label: 'NORMAL', color: '#facc15', generateNotes() {
        const b = 60000 / 140; const notes = [];
        function n(bar,bf,...ls){const t=Math.round((bar*4+bf)*b);for(const l of ls)notes.push({time:t,lane:l});}
        n(1,0,0);n(1,1,1);n(1,2,2);n(1,3,3);
        n(2,0,3);n(2,1,2);n(2,2,1);n(2,3,0);
        n(3,0,0);n(3,0.5,1);n(3,1,2);n(3,1.5,3);n(3,2,3);n(3,2.5,2);n(3,3,1);n(3,3.5,0);
        n(4,0,0);n(4,0.5,1);n(4,1,2);n(4,1.5,3);n(4,2,2);n(4,2.5,1);n(4,3,0);
        n(5,0,0);n(5,0.5,1);n(5,1,2);n(5,1.5,0);n(5,2,1);n(5,2.5,2);n(5,3,0);n(5,3.5,2);
        n(6,0,0);n(6,0.5,1);n(6,1,3);n(6,1.5,2);n(6,2,1);n(6,2.5,0);n(6,3,0);
        n(7,0,0);n(7,0.5,1);n(7,1,2);n(7,1.5,3);n(7,2,2,3);n(7,3,1,2);
        n(8,0,0,1);n(8,1,2,3);n(8,2,1,2);n(8,3,0,3);
        n(9,0,0);n(9,0.5,1);n(9,1,2);n(9,1.5,3);n(9,2,3);n(9,2.5,2);n(9,3,1);n(9,3.5,0);
        n(10,0,0,1);n(10,0.5,2);n(10,1,3);n(10,2,1);n(10,3,0,1);
        n(11,0,0);n(11,1,1,2);n(11,2,2,3);n(11,3,0,2);
        n(12,0,0,3);n(12,1,0);n(12,2,2);n(12,3,1,2);
        n(13,0,0);n(13,0.5,1);n(13,1,2);n(13,1.5,3);n(13,2,0,2);n(13,3,3);
        n(14,0,0,1);n(14,1,0);n(14,2,1,2);n(14,3,0,3);
        n(15,0,0);n(15,0.5,1);n(15,1,2);n(15,1.5,3);n(15,2,3);n(15,2.5,2);n(15,3,1);n(15,3.5,0);
        n(16,0,0,3);n(16,1,2);n(16,2,1,2);n(16,3,0,3);
        n(17,0,0);n(17,0.5,1);n(17,1,2);n(17,1.5,3);n(17,2,2);n(17,2.5,1);n(17,3,0);
        notes.sort((a,b_)=>a.time-b_.time); return notes;
      }},

      // HARD (current map)
      { label: 'HARD', color: '#f87171', generateNotes() {
        const b = 60000 / 140; const notes = [];
        function n(bar,bf,...ls){const t=Math.round((bar*4+bf)*b);for(const l of ls)notes.push({time:t,lane:l});}
        n(1,0,0);n(1,1,1);n(1,2,2);n(1,3,3);
        n(2,0,3);n(2,1,2);n(2,2,1);n(2,3,0);
        n(3,0,0);n(3,0.5,1);n(3,1,2);n(3,1.5,3);n(3,2,3);n(3,2.5,2);n(3,3,1);n(3,3.5,0);
        n(4,0,0);n(4,0.5,1);n(4,1,2);n(4,1.5,3);n(4,2,2);n(4,2.5,1);n(4,3,0);
        n(5,0,0);n(5,0.5,1);n(5,1,2,3);n(5,2,3);n(5,2.5,2);n(5,3,0,1);
        n(6,0,0,1);n(6,0.5,2);n(6,1,3);n(6,1.5,2);n(6,2,1);n(6,2.5,0);n(6,3,0,1);
        n(7,0,0);n(7,0.5,1);n(7,1,2);n(7,1.5,3);n(7,2,2,3);n(7,3,1,2);
        n(8,0,0,1);n(8,1,2,3);n(8,2,1,2);n(8,3,0,3);
        n(9,0,0);n(9,0.5,1);n(9,1,2);n(9,1.5,3);n(9,2,3);n(9,2.5,2);n(9,3,1);n(9,3.5,0);
        n(10,0,0,1);n(10,0.5,2);n(10,1,3);n(10,1.5,2,3);n(10,2,1);n(10,2.5,0);n(10,3,0,1);
        n(11,0,0);n(11,0.5,1);n(11,1,1,2);n(11,1.5,3);n(11,2,2,3);n(11,2.5,1);n(11,3,0,2);
        n(12,0,0,3);n(12,1,0);n(12,1.5,1);n(12,2,2);n(12,2.5,3);n(12,3,1,2);
        n(13,0,0);n(13,0.5,1);n(13,1,2);n(13,1.5,3);n(13,2,0,2);n(13,2.5,1);n(13,3,3);n(13,3.5,0,2);
        n(14,0,0,1);n(14,0.5,2,3);n(14,1,0);n(14,1.5,3);n(14,2,1,2);n(14,3,0,3);
        n(15,0,0);n(15,0.5,1);n(15,1,2);n(15,1.5,3);n(15,2,3);n(15,2.5,2);n(15,3,1);n(15,3.5,0);
        n(16,0,0,3);n(16,0.5,1);n(16,1,2);n(16,1.5,0,3);n(16,2,1,2);n(16,3,0,3);
        n(17,0,0);n(17,0.5,1);n(17,1,2);n(17,1.5,3);n(17,2,2);n(17,2.5,1);n(17,3,0);
        notes.sort((a,b_)=>a.time-b_.time); return notes;
      }},
    ]
  },

  // ── Rhythm Rebellion ── 160 BPM ────────────────────────────────
  {
    id: 'rhythm_rebellion', title: 'Rhythm Rebellion',
    file: 'bgm/Rhythm_Rebellion.mp3', bpm: 160, color: '#fb923c',
    difficulties: [
      { label: 'EASY', color: '#4ade80', generateNotes: makeEasy(160, 19) },

      { label: 'NORMAL', color: '#facc15', generateNotes() {
        const b = 60000 / 160; const notes = [];
        function n(bar,bf,...ls){const t=Math.round((bar*4+bf)*b);for(const l of ls)notes.push({time:t,lane:l});}
        n(1,0.5,0);n(1,1.5,2);n(1,2.5,1);n(1,3.5,3);
        n(2,0,2);n(2,1.5,0);n(2,2,3);n(2,3.5,1);
        n(3,0,0);n(3,0.5,3);n(3,1.5,1);n(3,2,2);n(3,2.5,0);n(3,3.5,3);
        n(4,0.5,0);n(4,1,2);n(4,1.5,1);n(4,2.5,3);n(4,3,0);n(4,3.5,2);
        n(5,0,0);n(5,0.5,3);n(5,1,1);n(5,1.5,2);n(5,2,0);n(5,2.5,3);n(5,3,1);n(5,3.5,2);
        n(6,0,0,3);n(6,0.5,1);n(6,1,2);n(6,2,1,2);n(6,3,0);
        n(7,0,0);n(7,0.5,1);n(7,1,2);n(7,1.5,0);n(7,2,1,3);n(7,3,0,3);

const HP_DRAIN_MISS = 15;
const HP_DRAIN_BAD  = 5;
const SCORE_GREAT   = 1000;
const SCORE_GOOD    = 500;

// ═══════════════════════════════════
//  DOM
// ═══════════════════════════════════
const bgmAudio      = document.getElementById('bgm');
const laneContainer = document.getElementById('lane-container');
const scoreDisplay  = document.getElementById('score-display');
const comboDisplay  = document.getElementById('combo-display');
const hpBar         = document.getElementById('hp-bar');
const progressBar   = document.getElementById('progress-bar');
const judgmentText  = document.getElementById('judgment-text');
const countdown     = document.getElementById('countdown');
const songListEl    = document.getElementById('song-list');

// ═══════════════════════════════════
//  SCREEN MANAGEMENT
// ═══════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
  document.getElementById('game-screen').style.display = id === 'game-screen' ? 'block' : 'none';
}

// ═══════════════════════════════════
//  SONG LIST
// ═══════════════════════════════════
function buildSongList() {
  songListEl.innerHTML = '';
  for (const song of SONGS) {
    const card = document.createElement('div');
    card.className = 'song-card';
    card.style.setProperty('--card-color', song.color);
    const btns = song.difficulties.map((d, i) =>
      `<button class="diff-btn ${d.label.toLowerCase()}" data-song="${song.id}" data-diff="${i}">${d.label}</button>`
    ).join('');
    card.innerHTML = `
      <div class="song-card-top">
        <div class="song-card-title">${song.title}</div>
        <div class="song-card-bpm">${song.bpm} BPM</div>
      </div>
      <div class="song-card-diffs">${btns}</div>`;
    card.querySelectorAll('.diff-btn').forEach(btn => {
      btn.addEventListener('click', () => startGame(song, song.difficulties[+btn.dataset.diff]));
    });
    songListEl.appendChild(card);
  }
}

// ═══════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════
let state = {};
let currentSong = null;
let currentDiff = null;
let judgmentTimer = null;

function initState(diff) {
  const notes = diff.generateNotes();
  state = {
    notes, activeNotes: [], spawnedIndex: 0,
    score: 0, combo: 0, maxCombo: 0, hp: MAX_HP,
    counts: { great:0, good:0, bad:0, miss:0 },
    startTime: null, animFrame: null, running: false,
    songDuration: notes[notes.length-1].time + 2200,
  };
}

// ═══════════════════════════════════
//  AUDIO (SFX)
// ═══════════════════════════════════
const AudioCtxCtor = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtxCtor();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function playClick(lane) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator(), g = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.frequency.value = [261,329,392,523][lane]; osc.type = 'sine';
  g.gain.setValueAtTime(0.12, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.09);
  osc.start(); osc.stop(ctx.currentTime+0.09);
}
function playBeep(high) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator(), g = ctx.createGain();
  osc.connect(g); g.connect(ctx.destination);
  osc.frequency.value = high ? 880 : 660; osc.type = 'triangle';
  g.gain.setValueAtTime(0.22, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.07);
  osc.start(); osc.stop(ctx.currentTime+0.07);
}

// ═══════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════
function gameLoop(ts) {
  if (!state.running) return;
  const elapsed = ts - state.startTime;

  while (state.spawnedIndex < state.notes.length) {
    const note = state.notes[state.spawnedIndex];
    if (elapsed >= note.time - NOTE_FALL_DURATION) {
      spawnNote(note, note.time - NOTE_FALL_DURATION);
      state.spawnedIndex++;
    } else break;
  }

  const toRemove = [];
  for (const an of state.activeNotes) {
    const progress = (elapsed - an.spawnTime) / NOTE_FALL_DURATION;
    an.el.style.top = (NOTE_START_Y + progress * (HIT_ZONE_Y - NOTE_START_Y)) + 'px';
    if (elapsed - an.note.time > BAD_WINDOW) { registerMiss(an); toRemove.push(an); }
  }
  toRemove.forEach(removeActiveNote);
  updateHUD(elapsed);

  if (elapsed >= state.songDuration &&
      state.spawnedIndex >= state.notes.length &&
      state.activeNotes.length === 0) { endGame(true); return; }

  state.animFrame = requestAnimationFrame(gameLoop);
}

function spawnNote(note, spawnTime) {
  const el = document.createElement('div');
  el.className = 'note'; el.dataset.lane = note.lane;
  el.style.left = LANE_POSITIONS[note.lane] + 'px';
  el.style.top  = NOTE_START_Y + 'px';
  laneContainer.appendChild(el);
  state.activeNotes.push({ el, note, spawnTime });
}
function removeActiveNote(an) {
  an.el.remove();
  const i = state.activeNotes.indexOf(an);
  if (i !== -1) state.activeNotes.splice(i, 1);
}
function updateHUD(elapsed) {
  scoreDisplay.textContent = state.score.toLocaleString();
  comboDisplay.textContent = state.combo >= 2 ? state.combo + ' COMBO' : '';
  hpBar.style.width = state.hp + '%';
  hpBar.style.background =
    state.hp <= 30  ? '#f87171' :
    state.hp <= 60  ? 'linear-gradient(90deg,#f87171,#facc15)' :
                      'linear-gradient(90deg,#f87171,#facc15,#4ade80)';
  progressBar.style.width = (Math.min(elapsed / state.songDuration, 1) * 100) + '%';
}

// ═══════════════════════════════════
//  INPUT
// ═══════════════════════════════════
function handleLanePress(lane) {
  if (!state.running) return;
  playClick(lane);
  const elapsed = performance.now() - state.startTime;
  let closest = null, cd = Infinity;
  for (const an of state.activeNotes) {
    if (an.note.lane !== lane) continue;
    const d = Math.abs(elapsed - an.note.time);
    if (d < cd) { cd = d; closest = an; }
  }
  if (!closest) return;
  if      (cd <= GREAT_WINDOW) judge(closest, 'great');
  else if (cd <= GOOD_WINDOW)  judge(closest, 'good');
  else if (cd <= BAD_WINDOW)   judge(closest, 'bad');
}
function judge(an, type) {
  showHitEffect(an.note.lane);
  removeActiveNote(an);
  state.counts[type]++;
  if (type === 'great') {
    state.score += Math.floor(SCORE_GREAT * (1 + state.combo * 0.01));
    state.combo++;
    showJudgment('GREAT', '#a855f7');
  } else if (type === 'good') {
    state.score += SCORE_GOOD;
    state.combo++;
    showJudgment('GOOD', '#4ade80');
  } else {
    state.combo = 0;
    state.hp = Math.max(0, state.hp - HP_DRAIN_BAD);
    showJudgment('BAD', '#facc15');
    checkHP();
  }
  state.maxCombo = Math.max(state.maxCombo, state.combo);
}
function registerMiss(an) {
  state.counts.miss++;
  state.combo = 0;
  state.hp = Math.max(0, state.hp - HP_DRAIN_MISS);
  showJudgment('MISS', '#f87171');
  checkHP();
}
function checkHP() { if (state.hp <= 0) endGame(false); }

function showJudgment(text, color) {
  judgmentText.textContent = text;
  judgmentText.style.color = color;
  judgmentText.style.opacity = '1';
  judgmentText.style.transform = 'translate(-50%, -60%)';
  clearTimeout(judgmentTimer);
  judgmentTimer = setTimeout(() => {
    judgmentText.style.opacity = '0';
    judgmentText.style.transform = 'translate(-50%, -70%)';
  }, 280);
}
function showHitEffect(lane) {
  const el = document.createElement('div');
  el.className = 'hit-effect';
  el.style.left = LANE_POSITIONS[lane] + 'px';
  el.style.top  = (HIT_ZONE_Y - 16) + 'px';
  el.style.background = ['rgba(248,113,113,.65)','rgba(250,204,21,.65)',
                          'rgba(74,222,128,.65)','rgba(96,165,250,.65)'][lane];
  laneContainer.appendChild(el);
  setTimeout(() => el.remove(), 350);
}

// ═══════════════════════════════════
//  START / END
// ═══════════════════════════════════
const DIFF_COLORS = { EASY:'#4ade80', NORMAL:'#facc15', HARD:'#f87171' };

function startGame(song, diff) {
  currentSong = song; currentDiff = diff;
  showScreen('game-screen');
  laneContainer.querySelectorAll('.note,.hit-effect').forEach(e => e.remove());
  document.getElementById('hud-song').textContent = song.title.toUpperCase();
  document.getElementById('hud-diff').textContent = diff.label;
  document.getElementById('hud-diff').style.color = diff.color;
  comboDisplay.textContent = '';

  getAudioCtx();
  bgmAudio.src = song.file; bgmAudio.load();
  bgmAudio.pause(); bgmAudio.currentTime = 0;
  initState(diff);

  countdown.style.display = 'flex';
  let count = 3; countdown.textContent = count; playBeep(true);
  const iv = setInterval(() => {
    count--;
    if (count > 0) { countdown.textContent = count; playBeep(count === 1); }
    else {
      clearInterval(iv); countdown.style.display = 'none';
      bgmAudio.play().catch(e => console.warn('BGM:', e));
      state.running = true;
      state.startTime = performance.now();
      state.animFrame = requestAnimationFrame(gameLoop);
    }
  }, 1000);
}

function endGame(success) {
  state.running = false;
  cancelAnimationFrame(state.animFrame);
  bgmAudio.pause(); bgmAudio.currentTime = 0;
  laneContainer.querySelectorAll('.note').forEach(e => e.remove());
  setTimeout(() => showResult(success), 600);
}
bgmAudio.addEventListener('ended', () => { if (state.running) endGame(true); });

// ═══════════════════════════════════
//  RESULT
// ═══════════════════════════════════
function showResult(success) {
  showScreen('result-screen');
  const total = state.notes.length;
  const acc = (state.counts.great + state.counts.good * 0.5) / total;
  let rank;
  if (!success)                               rank = 'F';
  else if (acc >= 0.95 && state.counts.miss === 0) rank = 'S';
  else if (acc >= 0.80) rank = 'A';
  else if (acc >= 0.60) rank = 'B';
  else                  rank = 'C';

  const rankColors = { S:'#facc15', A:'#a855f7', B:'#60a5fa', C:'#4ade80', F:'#f87171' };
  const badge = document.getElementById('result-diff-badge');
  badge.textContent = currentDiff.label;
  badge.style.color = currentDiff.color;
  badge.style.borderColor = currentDiff.color;

  document.getElementById('result-song-name').textContent  = currentSong.title.toUpperCase();
  document.getElementById('result-rank').textContent       = rank;
  document.getElementById('result-rank').style.color       = rankColors[rank];
  document.getElementById('result-status').textContent     = success ? 'CLEAR!' : 'FAILED...';
  document.getElementById('result-status').style.color     = success ? '#4ade80' : '#f87171';
  document.getElementById('r-score').textContent = state.score.toLocaleString();
  document.getElementById('r-combo').textContent = state.maxCombo;
  document.getElementById('r-great').textContent = state.counts.great;
  document.getElementById('r-good').textContent  = state.counts.good;
  document.getElementById('r-bad').textContent   = state.counts.bad;
  document.getElementById('r-miss').textContent  = state.counts.miss;
}

// ═══════════════════════════════════
//  EVENTS
// ═══════════════════════════════════
document.getElementById('title-start-btn').addEventListener('click', () => showScreen('select-screen'));
document.getElementById('select-back-btn').addEventListener('click', () => showScreen('title-screen'));
document.getElementById('result-back-btn').addEventListener('click', () => showScreen('select-screen'));
document.getElementById('retry-btn').addEventListener('click', () => startGame(currentSong, currentDiff));

const keyToLane = { d:0, f:1, j:2, k:3 };
document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  const lane = keyToLane[e.key.toLowerCase()];
  if (lane !== undefined) {
    handleLanePress(lane);
    document.querySelector(`.lane-btn[data-lane="${lane}"]`)?.classList.add('pressed');
  }
});
document.addEventListener('keyup', (e) => {
  const lane = keyToLane[e.key.toLowerCase()];
  if (lane !== undefined)
    document.querySelector(`.lane-btn[data-lane="${lane}"]`)?.classList.remove('pressed');
});
document.querySelectorAll('.lane-btn').forEach(btn => {
  const lane = parseInt(btn.dataset.lane);
  btn.addEventListener('mousedown',  (e) => { e.preventDefault(); handleLanePress(lane); });
  btn.addEventListener('touchstart', (e) => { e.preventDefault(); handleLanePress(lane); }, { passive: false });
});

buildSongList();
showScreen('title-screen');
</script>
</body>
</html>
